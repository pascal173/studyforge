<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>StudyForge Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
        font-family: Arial, Helvetica, sans-serif;
      }
      main {
        max-width: 560px;
        padding: 32px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }
      p {
        color: #475569;
        line-height: 1.6;
      }
      a {
        color: #1d4ed8;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>StudyForge is offline</h1>
      <p>Your saved study library is stored on this device. Reopen the app home page once it has been loaded at least once, and your cached workspace should be available.</p>
      <a href="/">Return to StudyForge</a>
    </main>
  </body>
</html>
